<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Nexus | Elite Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono&display=swap');
        body { background: #01040a; color: #f0f6fc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }
        #canvas-container { position: fixed; inset: 0; z-index: 0; opacity: 0.6; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); border-radius: 3rem; }
        .view { position: absolute; inset: 0; display: none; flex-direction: column; z-index: 10; padding: 2rem; overflow-y: auto; }
        .active { display: flex !important; }
        .node { aspect-ratio: 1; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: 0.3s; }
        .node:hover:not(.locked) { transform: scale(1.1); background: #00d2ff; color: #000; box-shadow: 0 0 30px rgba(0,210,255,0.4); }
        .completed { background: #00d2ff; color: #000; }
        .locked { opacity: 0.1; cursor: not-allowed; }
        .btn-blue { background: linear-gradient(135deg, #00d2ff, #0072ff); color: #000; font-weight: 800; border-radius: 1.5rem; transition: 0.3s; text-transform: uppercase; padding: 1.25rem 2.5rem; }
        .btn-blue:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,210,255,0.4); }
        .terminal { background: rgba(0,0,0,0.5); border-radius: 2rem; font-family: 'JetBrains Mono'; border: 1px solid rgba(0,210,255,0.1); padding: 1.5rem; }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } #cert { border: 15px double black !important; margin: 0 !important; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- LOGIN -->
    <section id="v-auth" class="view active items-center justify-center">
        <div class="glass p-12 text-center max-w-xl w-full shadow-2xl">
            <div class="w-20 h-20 bg-cyan-500/20 rounded-3xl mx-auto mb-8 flex items-center justify-center rotate-6"><i data-lucide="shield" class="text-cyan-400 w-10 h-10"></i></div>
            <h1 class="text-5xl font-black italic mb-2">Cyber<span class="text-cyan-400">Nexus</span></h1>
            <p class="text-[10px] opacity-40 uppercase tracking-[0.5em] mb-10">Senior Sentinel Training</p>
            <input type="text" id="agent-in" placeholder="Codinome" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 mb-6 text-center text-xl font-bold focus:border-cyan-400 outline-none">
            <button onclick="doLogin()" class="w-full btn-blue">Aceder ao Núcleo</button>
        </div>
    </section>

    <!-- DASHBOARD -->
    <section id="v-dash" class="view flex-col">
        <nav class="flex justify-between items-center mb-8 glass !rounded-none p-6 border-x-0 border-t-0">
            <div class="flex items-center gap-4"><span class="text-2xl font-black">CN.</span><span id="n-name" class="text-xs font-bold uppercase opacity-60"></span></div>
            <div class="flex items-center gap-6">
                <div class="w-48 h-1.5 bg-white/10 rounded-full overflow-hidden"><div id="n-bar" class="h-full bg-cyan-400 transition-all duration-1000" style="width:0%"></div></div>
                <button id="n-cert" disabled onclick="go('v-cert')" class="text-[10px] font-black border border-white/10 px-6 py-2 rounded-xl disabled:opacity-20 uppercase">Certificado</button>
                <button onclick="location.reload()" class="opacity-20 hover:opacity-100"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </nav>
        <div class="glass p-10 flex-1 overflow-hidden flex flex-col">
            <h2 class="text-xl font-black mb-8 opacity-40 uppercase italic">Matriz de Conhecimento</h2>
            <div id="grid" class="grid grid-cols-6 sm:grid-cols-10 lg:grid-cols-15 gap-3 overflow-y-auto pr-2"></div>
        </div>
    </section>

    <!-- MODULE -->
    <section id="v-mod" class="view flex-col">
        <div class="flex justify-between mb-6"><button onclick="go('v-dash')" class="text-xs font-bold uppercase flex items-center gap-2 opacity-50 hover:opacity-100 transition"><i data-lucide="chevron-left"></i> Mapa</button> <div class="text-center"><p id="m-cat" class="text-[9px] text-cyan-400 font-bold uppercase"></p><h3 id="m-id" class="text-sm font-black"></h3></div> <div class="w-10"></div></div>
        <div class="flex flex-col lg:flex-row gap-8 flex-1">
            <div class="flex-1 glass p-10 overflow-y-auto">
                <h2 id="m-title" class="text-4xl font-black mb-6 italic"></h2>
                <div id="m-body" class="text-lg opacity-60 leading-relaxed mb-8"></div>
                <div class="terminal"><h4 class="text-[10px] text-cyan-400 font-bold mb-4 uppercase tracking-widest">Protocolos de Comando</h4><div id="m-cmds" class="space-y-3 font-mono text-sm"></div></div>
            </div>
            <div class="w-full lg:w-80 space-y-6">
                <div class="glass p-8">
                    <button onclick="makePDF()" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-left mb-4 hover:border-cyan-400 transition">
                        <p class="text-[10px] font-bold text-cyan-400">PDF_ESTUDO.PDF</p><p class="text-[8px] opacity-40">Teoria + Labs</p>
                    </button>
                    <button onclick="go('v-exam')" class="w-full btn-blue py-4 text-xs">Validar Nó</button>
                </div>
                <div class="glass p-6 h-64 flex flex-col">
                    <h3 class="text-[10px] font-bold opacity-30 mb-4 uppercase">Oracle AI</h3>
                    <div id="chat" class="flex-1 overflow-y-auto text-[10px] space-y-4 mb-4 pr-1"></div>
                    <div class="flex gap-2 bg-black/40 p-1 rounded-xl border border-white/10"><input type="text" id="chat-in" placeholder="..." class="flex-1 bg-transparent text-[10px] px-3 focus:outline-none"><button onclick="askAI()" class="bg-cyan-500 text-black px-3 py-1 rounded-lg text-[10px] font-bold">SEND</button></div>
                </div>
            </div>
        </div>
    </section>

    <!-- EXAM -->
    <section id="v-exam" class="view items-center justify-center p-6 text-center">
        <div class="glass p-12 max-w-2xl w-full">
            <h2 class="text-3xl font-black mb-8 italic">Validação de Nó</h2>
            <p class="text-lg font-bold opacity-60 mb-10">Qual o objetivo sênior desta ferramenta?</p>
            <div class="grid gap-4">
                <button onclick="pass()" class="p-6 border border-white/10 rounded-2xl hover:border-cyan-400 transition-all font-bold">A) Auditoria de segurança e resiliência de perímetro.</button>
                <button onclick="alert('Incorreto.')" class="p-6 border border-white/10 rounded-2xl hover:border-red-500 transition-all font-bold">B) Gestão de equipas e marketing digital.</button>
            </div>
        </div>
    </section>

    <!-- CERT -->
    <section id="v-cert" class="view items-center justify-center">
        <div id="cert" class="bg-white text-black p-20 rounded shadow-2xl border-[20px] border-double border-blue-900 max-w-4xl w-full text-center font-serif">
            <h4 class="text-blue-900 font-bold uppercase tracking-widest text-[10px] mb-10">Cyber Nexus Academy</h4>
            <p class="italic mb-4">Certificamos o Agente</p>
            <h1 id="c-name" class="text-5xl font-black border-b-4 border-black inline-block px-10 pb-2 mb-10 font-sans italic"></h1>
            <p class="text-lg max-w-xl mx-auto font-sans font-light">concluiu com êxito os 600 módulos da trilha <strong>Omni-Sentinel</strong>.</p>
            <p class="mt-10 font-sans text-[10px] font-bold opacity-40">NX-SENIOR-77-VERIFIED</p>
        </div>
        <button onclick="window.print()" class="btn-blue mt-10">Imprimir</button>
    </section>

    <script>
        let state = { agent: "", done: [] }, curId = 0, nexus;
        const TOOLS = [{n:"Nmap",c:"NETWORK",d:"Varredura furtiva e scripts NSE."}, {n:"Metasploit",c:"EXPLOIT",d:"Framework de intrusão industrial."}, {n:"Burp",c:"WEB",d:"Auditoria de tráfego HTTP/S."}, {n:"Wireshark",c:"INTEL",d:"Análise profunda de pacotes."}];

        const go = id => { document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); lucide.createIcons(); };
        
        const init3D = () => {
            const s = new THREE.Scene(), c = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000), r = new THREE.WebGLRenderer({antialias:true,alpha:true});
            r.setSize(innerWidth, innerHeight); document.getElementById('canvas-container').appendChild(r.domElement);
            const l = new THREE.PointLight(0x00d2ff, 2, 100); l.position.set(20,20,20); s.add(l, new THREE.AmbientLight(0x111111));
            c.position.z = 50;
            const update = id => { if(nexus) s.remove(nexus); nexus = new THREE.Mesh(id%2?new THREE.TorusKnotGeometry(12,3,100,16):new THREE.IcosahedronGeometry(15,1), new THREE.MeshPhongMaterial({color:new THREE.Color(`hsl(${(id*137)%360},80%,60%)`),wireframe:true,transparent:true,opacity:0.15})); s.add(nexus); };
            const anim = () => { requestAnimationFrame(anim); if(nexus){nexus.rotation.y+=0.002; nexus.rotation.x+=0.001;} r.render(s,c); };
            window.update3D = update; anim(); update(0);
        };

        const doLogin = () => { let n = document.getElementById('agent-in').value.trim(); if(!n) return; state.agent = n.toUpperCase(); renderDash(); go('v-dash'); };
        const renderDash = () => {
            document.getElementById('n-name').innerText = state.agent;
            document.getElementById('n-bar').style.width = (state.done.length/600*100)+'%';
            document.getElementById('n-prog').innerText = `NÓS: ${state.done.length} / 600`;
            let g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=1;i<=600;i++){
                let d = state.done.includes(i), l = i>1 && !state.done.includes(i-1);
                let b = document.createElement('div'); b.className = `node ${d?'completed':''} ${l?'locked':''}`; b.innerText = i;
                b.onclick = () => !l && loadMod(i); g.appendChild(b);
            }
            if(state.done.length === 600) document.getElementById('n-cert').disabled = false;
            document.getElementById('c-name').innerText = state.agent;
        };

        const loadMod = id => {
            curId = id; update3D(id); let t = TOOLS[id%TOOLS.length];
            document.getElementById('m-id').innerText = `ESTAÇÃO #${id}`; document.getElementById('m-cat').innerText = t.c;
            document.getElementById('m-title').innerText = `Mastering ${t.n}`;
            document.getElementById('m-body').innerText = `${t.d} Nesta lição nível sénior, focamos na manipulação de cabeçalhos e evasão de telemetria.`;
            document.getElementById('m-cmds').innerHTML = `<div class="bg-black/30 p-4 rounded-xl border border-white/5 text-cyan-400">$ ${t.n.toLowerCase()} -scan -A target</div>`;
            go('v-mod');
        };

        const pass = () => { if(!state.done.includes(curId)) state.done.push(curId); renderDash(); go('v-dash'); update3D(0); };
        
        const makePDF = () => {
            const d = new window.jspdf.jsPDF(); d.setFillColor(2,4,12); d.rect(0,0,210,297,'F');
            d.setTextColor(0,210,255); d.setFontSize(22); d.text("CYBER NEXUS DATA", 20, 30);
            d.setTextColor(255,255,255); d.setFontSize(12); d.text(`Aula #${curId}: Teoria e Pratica Profissional`, 20, 45);
            d.save(`Nexus_Node_${curId}.pdf`);
        };

        const askAI = async () => {
            let i = document.getElementById('chat-in'), q = i.value.trim(), f = document.getElementById('chat'); if(!q) return;
            f.innerHTML += `<div class="opacity-40 text-right">Op: ${q}</div>`; i.value = "";
            try {
                let res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({contents:[{parts:[{text:q}]}], systemInstruction:{parts:[{text:"Es o Oracle, mentor senior de segurança. Respostas tecnicas e curtas."}]}})});
                let d = await res.json(); f.innerHTML += `<div class="text-cyan-400">Oracle: ${d.candidates[0].content.parts[0].text}</div>`; f.scrollTop = f.scrollHeight;
            } catch(e){}
        };

        window.onload = init3D;
    </script>
</body>
                                                                                                                     </html>
